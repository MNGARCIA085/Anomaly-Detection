random_state: 42
experiment_name: anomaly_detection
tracking:
  enabled: true
model_type:
  models:
    input_dim: 11
    encoder_dims:
    - 8
    - 4
    decoder_dims:
    - 8
  training:
    lr: 0.001
    batch_size: 32
    epochs: 5
  tuning:
    model_space:
      encoder_dims:
      - name: enc1
        type: int
        low: 16
        high: 64
      - name: enc2
        type: int
        low: 4
        high: 32
      decoder_dims:
      - name: dec1
        type: int
        low: 16
        high: 64
    training_space:
      lr:
        name: lr
        type: float
        low: 0.0001
        high: 0.01
        log: true
      epochs:
        name: epochs
        type: int
        low: 5
        high: 20
      batch_size:
        name: batch_size
        type: categorical
        choices:
        - 32
        - 64
  prep:
    scale: true
    scaler: standard
    feature_selection:
      enabled: false
    normalize:
      enabled: true
  name: ae
preprocessing:
  image_dir: images-small
  train_path: train-small.csv
  valid_path: valid-small.csv
  test_path: test.csv
models:
  input_dim: 11
  encoder_dims:
  - 8
  - 4
  decoder_dims:
  - 8
training:
  lr: 0.001
  batch_size: 32
  epochs: 5
tuning:
  model_space:
    encoder_dims:
    - name: enc1
      type: int
      low: 16
      high: 64
    - name: enc2
      type: int
      low: 4
      high: 32
    decoder_dims:
    - name: dec1
      type: int
      low: 16
      high: 64
  training_space:
    lr:
      name: lr
      type: float
      low: 0.0001
      high: 0.01
      log: true
    epochs:
      name: epochs
      type: int
      low: 5
      high: 20
    batch_size:
      name: batch_size
      type: categorical
      choices:
      - 32
      - 64
